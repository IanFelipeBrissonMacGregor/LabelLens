name: label_lens
description: "App para escanear rótulos nutricionais de produtos"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Câmera
  camera: ^0.11.0+2

  # ML Kit para reconhecimento de texto (você vai usar em breve)
  google_mlkit_text_recognition: ^0.14.0

  # Ícones (já vem por padrão)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Caso queira adicionar assets no futuro (ex: ícones, imagens)
  # assets:
  #   - assets/images/